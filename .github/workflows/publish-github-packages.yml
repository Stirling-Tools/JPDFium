name: Publish to GitHub Packages

on:
  push:
    tags: ['v*.*.*']
    branches: [main, publishing-setup]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0 or 1.0.0-SNAPSHOT). If omitted on tag push, derived from the tag.'
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: ghpkgs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-natives:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux-x64,    runner: ubuntu-latest }
          - { platform: linux-arm64,  runner: ubuntu-24.04-arm }
          - { platform: darwin-x64,   runner: macos-13 }
          - { platform: darwin-arm64, runner: macos-14 }
          - { platform: windows-x64,  runner: windows-latest }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Install build deps (Linux)
        if: startsWith(matrix.platform, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config

      - name: Install build deps (macOS)
        if: startsWith(matrix.platform, 'darwin-')
        run: brew install cmake ninja

      - name: Install build deps (Windows)
        if: matrix.platform == 'windows-x64'
        run: choco install -y cmake ninja

      - run: bash native/setup-pdfium.sh
      - run: bash native/build-real.sh

      - name: Stage binaries
        run: |
          mkdir -p native/dist/${{ matrix.platform }}
          find native/build-real -maxdepth 3 -type f \( \
                -name 'libjpdfium.*' -o -name 'jpdfium.dll' \
             \) -exec cp -v {} native/dist/${{ matrix.platform }}/ \;
          find native/pdfium/lib native/pdfium -maxdepth 3 -type f \( \
                -name 'libpdfium.*' -o -name 'pdfium.dll' \
             \) -exec cp -v {} native/dist/${{ matrix.platform }}/ \; 2>/dev/null || true

      - name: Sanity check
        run: |
          test -n "$(ls -A native/dist/${{ matrix.platform }}/)" || {
            echo "ERROR: no native binaries staged for ${{ matrix.platform }}"
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: natives-${{ matrix.platform }}
          path: native/dist/${{ matrix.platform }}/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build-natives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/download-artifact@v4
        with:
          path: .artifacts
          pattern: natives-*

      - name: Flatten into native/dist/<platform>/
        run: |
          mkdir -p native/dist
          for d in .artifacts/natives-*; do
            plat="${d##*natives-}"
            mkdir -p "native/dist/$plat"
            cp -v "$d"/* "native/dist/$plat/"
          done
          echo "--- final layout ---"
          find native/dist -type f | sort

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            REF="${GITHUB_REF_NAME}"
            VERSION="${REF#v}"
          else
            # Branch push -> SNAPSHOT based on gradle.properties.
            # Non-main branches get the branch name injected so concurrent test
            # branches don't clobber each other's published versions.
            BASE=$(grep '^jpdfium.version=' gradle.properties | cut -d= -f2)
            BASE="${BASE%-SNAPSHOT}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              VERSION="${BASE}-SNAPSHOT"
            else
              # slugify branch name: replace non-alphanumerics with dashes
              SLUG=$(echo "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9' '-' | sed 's/-*$//')
              VERSION="${BASE}-${SLUG}-SNAPSHOT"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ./gradlew \
            :jpdfium:publishAllPublicationsToGithubPackagesRepository \
            :jpdfium-bom:publishAllPublicationsToGithubPackagesRepository \
            :jpdfium-spring:publishAllPublicationsToGithubPackagesRepository \
            :jpdfium-natives:jpdfium-natives-linux-x64:publishAllPublicationsToGithubPackagesRepository \
            :jpdfium-natives:jpdfium-natives-linux-arm64:publishAllPublicationsToGithubPackagesRepository \
            :jpdfium-natives:jpdfium-natives-darwin-x64:publishAllPublicationsToGithubPackagesRepository \
            :jpdfium-natives:jpdfium-natives-darwin-arm64:publishAllPublicationsToGithubPackagesRepository \
            :jpdfium-natives:jpdfium-natives-windows-x64:publishAllPublicationsToGithubPackagesRepository \
            -Pjpdfium.version=${{ steps.v.outputs.version }} \
            --no-daemon --stacktrace

      - name: Summary
        run: |
          echo "### Published to GitHub Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: \`${{ steps.v.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Repo: <https://github.com/${{ github.repository }}/packages>" >> $GITHUB_STEP_SUMMARY
